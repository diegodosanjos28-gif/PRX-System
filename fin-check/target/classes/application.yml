spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/conciliacao
    username: conciliacao
    password: conciliacao123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:default-secret-must-be-replaced-in-production-min-32-chars}
  expiration: ${JWT_EXPIRATION_MS:28800000}

crypto:
  secret-key: ${CRYPTO_SECRET_KEY:must-be-replaced-in-production-32ch}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  base-url: https://api.anthropic.com
  model: claude-sonnet-4-20250514
  max-tokens: 1500

meta:
  access-token: ${META_ACCESS_TOKEN:}
  phone-number-id: ${META_PHONE_NUMBER_ID:}
  webhook-secret: ${META_WEBHOOK_SECRET:}
  base-url: https://graph.facebook.com/v19.0

mensagem:
  template: |
    Olá {nomeFantasia}!

    Realizamos a auditoria das suas taxas no período de {dataInicio} a {dataFim}.

    Resumo de transações ({estabelecimento}):
    - Total de transações: {totalTransacoes}
    - Valor cobrado a mais: R$ {cobradoAMais}
    - Valor cobrado a menos: R$ {cobradoAMenos}

    Recebimentos no período:
    - Total recebido: R$ {totalRecebido}
    - Total descontado em taxas: R$ {totalDescontado}

    Entre em contato para mais informações.

logging:
  level:
    com.conciliacao: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
