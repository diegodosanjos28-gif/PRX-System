  secret: ${JWT_SECRET:default-secret-must-be-replaced-in-production-min-32-chars}
  expiration: ${JWT_EXPIRATION_MS:28800000}

crypto:
  secret-key: ${CRYPTO_SECRET_KEY:must-be-replaced-in-production-32ch}

anthropic:
