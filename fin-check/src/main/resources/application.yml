spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/conciliacao
    username: conciliacao
    password: conciliacao123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: false

server:
  port: ${SERVER_PORT:8080}

