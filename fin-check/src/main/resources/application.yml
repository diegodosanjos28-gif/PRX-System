spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/conciliacao}
    username: ${DB_USERNAME:conciliacao}
    password: ${DB_PASSWORD:conciliacao123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:default-secret-must-be-replaced-in-production-min-32-chars}
  expiration: ${JWT_EXPIRATION_MS:28800000}

crypto:
  secret-key: ${CRYPTO_SECRET_KEY:-change-this-crypto-key-in-production}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  base-url: https://api.anthropic.com
  model: claude-sonnet-4-20250514
  max-tokens: 1500

meta:
  access-token: ${META_ACCESS_TOKEN:}
  phone-number-id: ${META_PHONE_NUMBER_ID:914156325110895}
  webhook-secret: ${META_WEBHOOK_SECRET:secret-webhook}
  base-url: https://graph.facebook.com/v25.0


logging:
  level:
    com.conciliacao: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
